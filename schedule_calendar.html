const FILTER_OPTIONS = {"teachers": ["Carrie校长", "娜娜", "小牛老师", "小蓝老师"], "courses": ["2026复地暑假毛笔班", "2026复地暑假硬笔班", "2026复地暑假美术班"], "classrooms": ["彩梦阁", "楚天阁", "翰墨堂", "逐梦轩", "雅风阁"]};
const BADGE_CONFIG = {"试听": {"bg": "rgba(0,0,0,0.25)", "color": "#fff"}, "补课": {"bg": "rgba(0,0,0,0.25)", "color": "#fff"}, "约课": {"bg": "rgba(0,0,0,0.25)", "color": "#fff"}, "未点名": {"bg": "rgba(255,255,255,0.85)", "color": "#495057"}, "已点名": {"bg": "rgba(255,255,255,0.85)", "color": "#1971C2"}};
const STATUS_OPTIONS = ["试听", "补课", "约课", "未点名", "已点名"];

let currentWeekStart = getWeekStart(new Date());
let currentView = 'week';
let selectedStatuses = new Set();

function init() {
  populateFilters();
  renderStatusPills();
  bindEvents();
  render();
}

function getWeekStart(d) {
  const day = d.getDay() || 7;
  const diff = d.getDate() - day + 1;
  return new Date(d.getFullYear(), d.getMonth(), diff);
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateShort(d) {
  return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatTime(iso) {
  if (!iso) return '';
  // ISO format: 2026-07-06T09:00:00.000+0800 — already Beijing time, extract HH:MM directly
  return iso.substring(11, 16);
}

function parseEventDate(iso) {
  if (!iso) return null;
  // ISO format: 2026-07-06T09:00:00.000+0800 — extract date+time and create date in +08:00
  const dateStr = iso.substring(0, 10);
  const timeStr = iso.substring(11, 19);
  return new Date(dateStr + 'T' + timeStr + '+08:00');
}

function changeWeek(delta) {
  if (delta === 0) {
    currentWeekStart = getWeekStart(new Date());
  } else {
    currentWeekStart.setDate(currentWeekStart.getDate() + delta * 7);
  }
  render();
}

function populateFilters() {
  populateSelect('teacherFilter', FILTER_OPTIONS.teachers);
  populateSelect('courseFilter', FILTER_OPTIONS.courses);
  populateSelect('classroomFilter', FILTER_OPTIONS.classrooms);
}

function populateSelect(id, items) {
  const sel = document.getElementById(id);
  // 保留第一个"全部"选项
  sel.innerHTML = sel.options[0] ? sel.options[0].outerHTML : '<option value="">全部</option>';
  items.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item;
    opt.textContent = item;
    sel.appendChild(opt);
  });
}

function renderStatusPills() {
  const container = document.getElementById('statusPills');
  container.innerHTML = '';
  STATUS_OPTIONS.forEach(status => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill' + (selectedStatuses.has(status) ? ' active' : '');
    pill.textContent = status;
    pill.onclick = () => {
      if (selectedStatuses.has(status)) selectedStatuses.delete(status);
      else selectedStatuses.add(status);
      renderStatusPills();
      render();
    };
    container.appendChild(pill);
  });
}

function getSelectedValues(id) {
  const sel = document.getElementById(id);
  const values = Array.from(sel.selectedOptions).map(o => o.value).filter(v => v);
  return values;
}

function resetFilters() {
  ['teacherFilter','courseFilter','classroomFilter'].forEach(id => {
    document.getElementById(id).selectedIndex = -1;
  });
  selectedStatuses.clear();
  renderStatusPills();
  render();
}

function bindEvents() {
  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentView = tab.dataset.view;
      render();
    });
  });

  ['teacherFilter', 'courseFilter', 'classroomFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
  });
}

function getBadgeStyle(badge) {
  const cfg = BADGE_CONFIG[badge] || { bg: 'rgba(255,255,255,0.2)', color: '#fff' };
  return `background:${cfg.bg};color:${cfg.color}`;
}

function passesFilters(ev) {
  const selectedTeachers = getSelectedValues('teacherFilter');
  if (selectedTeachers.length) {
    const hasMatch = ev.teachers && ev.teachers.some(t => selectedTeachers.includes(t));
    if (!hasMatch) return false;
  }

  const selectedCourses = getSelectedValues('courseFilter');
  if (selectedCourses.length && !selectedCourses.includes(ev.course)) return false;

  const selectedClassrooms = getSelectedValues('classroomFilter');
  if (selectedClassrooms.length && !selectedClassrooms.includes(ev.classroom)) return false;

  if (selectedStatuses.size) {
    const hasStatus = ev.badges && ev.badges.some(b => selectedStatuses.has(b));
    if (!hasStatus) return false;
  }

  return true;
}

function render() {
  if (currentView === 'week') {
    document.getElementById('weekGrid').style.display = 'grid';
    document.getElementById('dayView').classList.remove('active');
    renderWeek();
  } else {
    document.getElementById('weekGrid').style.display = 'none';
    document.getElementById('dayView').classList.add('active');
    renderDay();
  }
}

function renderWeek() {
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  const weekEnd = new Date(currentWeekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  document.getElementById('weekRange').textContent = `${formatDate(currentWeekStart)} ~ ${formatDate(weekEnd)}`;

  const dayEvents = [[], [], [], [], [], [], []];
  let matchedCount = 0;
  let unNamedCount = 0;

  EVENTS.forEach(ev => {
    if (!passesFilters(ev)) return;
    const begin = parseEventDate(ev.begin_time);
    if (!begin) return;
    const dayIndex = Math.floor((begin - currentWeekStart) / (24 * 60 * 60 * 1000));
    if (dayIndex >= 0 && dayIndex < 7) {
      dayEvents[dayIndex].push(ev);
      matchedCount++;
      if (ev.naming_status === '未点名') unNamedCount++;
    }
  });

  document.getElementById('summary').innerHTML = `共 <span class="highlight">${matchedCount}</span> 节课（未点名 <span class="highlight">${unNamedCount}</span> 节课）`;

  const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
  const todayStr = formatDate(new Date());

  for (let i = 0; i < 7; i++) {
    const d = new Date(currentWeekStart);
    d.setDate(d.getDate() + i);
    const isToday = formatDate(d) === todayStr;
    const count = dayEvents[i].length;

    const col = document.createElement('div');
    col.className = 'day-column';

    const header = document.createElement('div');
    header.className = 'day-header' + (isToday ? ' today' : '');
    header.innerHTML = `<div class="day-name">${dayNames[i]}</div><div class="day-date">${formatDateShort(d)}</div><div class="day-count">共 ${count} 节课</div>`;
    col.appendChild(header);

    const body = document.createElement('div');
    body.className = 'day-body';

    if (count === 0) {
      body.innerHTML = '<div class="day-empty">暂无课程</div>';
    } else {
      const events = dayEvents[i].sort((a, b) => parseEventDate(a.begin_time) - parseEventDate(b.begin_time));
      events.forEach(ev => {
        body.appendChild(createEventCard(ev));
      });
    }

    col.appendChild(body);
    grid.appendChild(col);
  }
}

function renderDay() {
  const header = document.getElementById('dayViewHeader');
  const list = document.getElementById('dayViewList');
  list.innerHTML = '';

  // 默认显示今天
  const today = new Date();
  const dayStr = formatDate(today);
  const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  header.textContent = `${dayNames[today.getDay()]} ${dayStr} 课程列表`;

  const dayEvents = EVENTS.filter(ev => {
    if (!passesFilters(ev)) return false;
    const begin = parseEventDate(ev.begin_time);
    return begin && formatDate(begin) === dayStr;
  }).sort((a, b) => parseEventDate(a.begin_time) - parseEventDate(b.begin_time));

  if (dayEvents.length === 0) {
    list.innerHTML = '<div class="day-empty">今日暂无课程</div>';
    return;
  }

  dayEvents.forEach(ev => {
    list.appendChild(createDayViewCard(ev));
  });
}

  card.className = 'event-card';
  card.style.background = ev.color;
  card.onclick = () => openModal(ev);

  const badgesHtml = ev.badges.map(b => `<span class="event-badge" style="${getBadgeStyle(b)}">${b}</span>`).join('');

  const teacherText = ev.teachers && ev.teachers.length ? ev.teachers.join('、') : (ev.teacher || '待定');
  const studentNames = ev.student_names || '';

  card.innerHTML = `

    <div class="event-course">${ev.course || '课程'}</div>
    <div class="event-title">${ev.title || ''}</div>
    <div class="event-info">
      <span><span class="icon">👤</span> ${teacherText}</span>
    </div>
    <div class="event-info">
      <span><span class="icon">📍</span> ${ev.classroom || '待定教室'}</span>
    </div>
    <div class="event-count">${peopleText} · 第 ${ev.course_ord || 0} 节</div>
    ${studentNames ? `<div class="event-students"><span class="icon">👥</span> ${studentNames}</div>` : ''}
    <div class="event-badges">${badgesHtml}</div>
  `;
  return card;
}

function createDayViewCard(ev) {
  const card = document.createElement('div');
  card.className = 'day-view-card';
  card.style.background = ev.color;
  card.onclick = () => openModal(ev);

  const badgesHtml = ev.badges.map(b => `<span class="event-badge" style="${getBadgeStyle(b)}">${b}</span>`).join('');
  const peopleText = ev.actual ? `${ev.actual} 人` : '暂无人数';
  const teacherText = ev.teachers && ev.teachers.length ? ev.teachers.join('、') : (ev.teacher || '待定');
  const studentNames = ev.student_names || '';

  card.innerHTML = `
    <div class="event-time">${formatTime(ev.begin_time)} - ${formatTime(ev.end_time)}</div>
    <div class="event-course">${ev.course || '课程'}</div>
    <div class="event-title">${ev.title || ''}</div>
    <div class="event-info"><span class="icon">👤</span> ${teacherText}</div>
    <div class="event-info"><span class="icon">📍</span> ${ev.classroom || '待定教室'}</div>
    <div class="event-count">${peopleText} · 第 ${ev.course_ord || 0} 节</div>
    ${studentNames ? `<div class="event-students"><span class="icon">👥</span> ${studentNames}</div>` : ''}
    <div class="event-badges">${badgesHtml}</div>
  `;
  return card;
}

function openModal(ev) {
  document.getElementById('modalTitle').textContent = ev.title || '课程详情';
  document.getElementById('modalSubtitle').textContent = `${formatTime(ev.begin_time)} - ${formatTime(ev.end_time)} · ${ev.weekday || ''}`;

  const teacherText = ev.teachers && ev.teachers.length ? ev.teachers.join('、') : (ev.teacher || '-');
  const badge = `<span class="detail-badge" style="background:${ev.color}">${ev.course || '课程'}</span>`;
  const badgesHtml = ev.badges.map(b => `<span class="detail-badge" style="background:${BADGE_CONFIG[b]?.bg || ev.color};color:${BADGE_CONFIG[b]?.color || '#fff'}">${b}</span>`).join('');
  document.getElementById('modalBody').innerHTML = `
    <div class="detail-row"><div class="detail-label">课程</div><div class="detail-value">${badge} ${badgesHtml}</div></div>
    <div class="detail-row"><div class="detail-label">班级</div><div class="detail-value">${ev.title || '-'}</div></div>
    <div class="detail-row"><div class="detail-label">时间</div><div class="detail-value">${formatTime(ev.begin_time)} - ${formatTime(ev.end_time)}</div></div>
    <div class="detail-row"><div class="detail-label">教室</div><div class="detail-value">${ev.classroom || '-'}</div></div>
    <div class="detail-row"><div class="detail-label">老师</div><div class="detail-value">${teacherText}</div></div>
    <div class="detail-row"><div class="detail-label">助教</div><div class="detail-value">${ev.assistant || '-'}</div></div>
    <div class="detail-row"><div class="detail-label">人数</div><div class="detail-value">${ev.actual} 人${ev.expected ? '（应到 ' + ev.expected + ' 人）' : ''}</div></div>
    <div class="detail-row"><div class="detail-label">学员</div><div class="detail-value">${ev.student_names || '暂未获取'}</div></div>
    <div class="detail-row"><div class="detail-label">课次</div><div class="detail-value">第 ${ev.course_ord} 节</div></div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('active');
}

init();
</script>
</body>
</html>
